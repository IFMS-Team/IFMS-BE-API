name: Telegram Notification
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 **Có Push mới trên GitHub!**
            
            *Repository:* `${{ github.repository }}`
            *Người thực hiện:* `${{ github.actor }}`
            *Nội dung commit:* `${{ github.event.head_commit.message }}`
            
            [Xem chi tiết commit tại đây](${{ github.event.head_commit.url }})